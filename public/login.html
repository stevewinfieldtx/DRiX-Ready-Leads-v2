<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in — DRiX Ready Leads</title>
<style>
  :root { --bg:#0f172a; --card:#fff; --ink:#0f172a; --muted:#64748b; --accent:#2563eb; --line:#e2e8f0; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif; background:linear-gradient(160deg,#0f172a,#1e293b); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { background:var(--card); width:100%; max-width:420px; border-radius:16px; padding:32px; box-shadow:0 20px 60px rgba(0,0,0,.35); }
  h1 { font-size:22px; margin:0 0 4px; color:var(--ink); }
  p.sub { margin:0 0 22px; color:var(--muted); font-size:14px; }
  label { display:block; font-size:13px; font-weight:600; color:var(--ink); margin:0 0 6px; }
  input { width:100%; padding:13px 14px; font-size:16px; border:1px solid var(--line); border-radius:10px; outline:none; }
  input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(37,99,235,.15); }
  button { width:100%; margin-top:16px; padding:13px; font-size:16px; font-weight:600; color:#fff; background:var(--accent); border:0; border-radius:10px; cursor:pointer; }
  button:disabled { opacity:.6; cursor:default; }
  .msg { margin-top:14px; font-size:14px; padding:10px 12px; border-radius:8px; display:none; }
  .msg.err { display:block; background:#fef2f2; color:#b91c1c; }
  .msg.ok  { display:block; background:#ecfdf5; color:#047857; }
  .hint { margin-top:18px; font-size:12px; color:var(--muted); line-height:1.5; }
  .code-input { letter-spacing:8px; text-align:center; font-size:22px; }
  .back { background:none; color:var(--muted); margin-top:8px; font-weight:500; }
  .badge { display:inline-block; font-size:11px; font-weight:700; color:#2563eb; background:#eff6ff; padding:4px 10px; border-radius:999px; margin-bottom:14px; }
</style>
</head>
<body>
  <div class="card">
    <span class="badge">DRiX READY LEADS</span>
    <h1 id="title">Sign in to continue</h1>
    <p class="sub" id="subtitle">Use your <strong>business email</strong>. We'll send a one-time code.</p>

    <!-- Step 1: email -->
    <form id="emailForm">
      <label for="email">Business email</label>
      <input id="email" type="email" autocomplete="email" placeholder="you@yourcompany.com" required />
      <button type="submit" id="emailBtn">Send me a code</button>
    </form>

    <!-- Step 2: code -->
    <form id="codeForm" style="display:none">
      <label for="code">Enter the 6-digit code</label>
      <input id="code" class="code-input" inputmode="numeric" maxlength="6" placeholder="000000" required />
      <button type="submit" id="codeBtn">Verify &amp; enter</button>
      <button type="button" class="back" id="backBtn">Use a different email</button>
    </form>

    <div class="msg" id="msg"></div>
    <p class="hint">New here? You get <strong>3 free runs</strong>. After that it's $10 for 10 runs — or redeem a code inside the app. Personal Gmail / Yahoo / Outlook addresses aren't accepted; please use your work email.</p>
  </div>

<script>
  var emailForm = document.getElementById('emailForm');
  var codeForm  = document.getElementById('codeForm');
  var msg = document.getElementById('msg');
  var currentEmail = '';

  function show(type, text){ msg.className = 'msg ' + type; msg.textContent = text; }
  function clearMsg(){ msg.className = 'msg'; msg.textContent = ''; }

  emailForm.addEventListener('submit', async function(e){
    e.preventDefault(); clearMsg();
    var btn = document.getElementById('emailBtn');
    currentEmail = document.getElementById('email').value.trim();
    btn.disabled = true; btn.textContent = 'Sending…';
    try {
      var r = await fetch('/api/auth/request-code', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email: currentEmail })
      });
      var d = await r.json();
      if (!r.ok) { show('err', d.error || 'Something went wrong.'); btn.disabled=false; btn.textContent='Send me a code'; return; }
      emailForm.style.display='none'; codeForm.style.display='block';
      document.getElementById('title').textContent='Check your email';
      document.getElementById('subtitle').innerHTML='We sent a 6-digit code to <strong>'+currentEmail+'</strong>.';
      show('ok','Code sent. It expires in 10 minutes.');
      document.getElementById('code').focus();
      if (d.devCode) show('ok','Dev mode — your code is '+d.devCode);
    } catch(err){ show('err','Network error. Try again.'); btn.disabled=false; btn.textContent='Send me a code'; }
  });

  codeForm.addEventListener('submit', async function(e){
    e.preventDefault(); clearMsg();
    var btn = document.getElementById('codeBtn');
    btn.disabled = true; btn.textContent = 'Verifying…';
    try {
      var r = await fetch('/api/auth/verify', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email: currentEmail, code: document.getElementById('code').value.trim() })
      });
      var d = await r.json();
      if (!r.ok) { show('err', d.error || 'Invalid code.'); btn.disabled=false; btn.textContent='Verify & enter'; return; }
      show('ok','Signed in. Loading…');
      window.location.href = '/';
    } catch(err){ show('err','Network error. Try again.'); btn.disabled=false; btn.textContent='Verify & enter'; }
  });

  document.getElementById('backBtn').addEventListener('click', function(){
    codeForm.style.display='none'; emailForm.style.display='block'; clearMsg();
    document.getElementById('title').textContent='Sign in to continue';
    document.getElementById('subtitle').innerHTML='Use your <strong>business email</strong>. We\'ll send a one-time code.';
  });
</script>
</body>
</html>
