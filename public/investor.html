<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DRiX Investor</title>
<style>
  :root{
    --navy:#1f3864; --navy2:#2e5496; --gold:#b8860b; --gold2:#d8a93a;
    --ink:#1a1d24; --muted:#6b7280; --line:#e3e7ee; --bg:#f6f8fb; --card:#ffffff;
    --good:#1f7a4d; --warn:#9a6a00; --bad:#9a2a2a;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink);}
  header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:22px 28px;}
  header h1{margin:0;font-size:22px;letter-spacing:.2px}
  header .tag{margin-top:4px;font-size:13px;color:#cdd8ee}
  header .tag b{color:var(--gold2)}
  .wrap{max-width:1060px;margin:0 auto;padding:24px 20px 60px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:18px;box-shadow:0 1px 2px rgba(20,30,50,.04)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
  input[type=text]{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;background:#fbfcfe}
  input[type=text]:focus{outline:none;border-color:var(--navy2);background:#fff}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{border:0;background:#fff;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted)}
  .seg button.on{background:var(--navy);color:#fff}
  .row{display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap;margin-top:8px}
  .run{margin-top:18px;background:var(--gold);color:#fff;border:0;border-radius:10px;padding:13px 26px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.2px}
  .run:hover{background:#a5780a}
  .run:disabled{opacity:.5;cursor:not-allowed}
  .hint{font-size:12px;color:var(--muted);margin-top:8px}
  .stage{display:none}
  .stage.show{display:block}
  .phases{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;color:#334}
  .phase{padding:6px 0;border-bottom:1px dashed var(--line);display:flex;gap:10px;align-items:center}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--gold2);flex:0 0 auto;animation:pulse 1s infinite}
  .phase.done .dot{background:var(--good);animation:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .counts{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px}
  .chip{background:#eef2f9;border:1px solid var(--line);border-radius:20px;padding:6px 13px;font-size:13px;font-weight:600;color:var(--navy)}
  .chip b{color:var(--gold)}
  .brief h2{font-size:15px;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--gold);padding-bottom:6px;margin:22px 0 12px}
  .score{display:flex;align-items:center;gap:16px;margin-bottom:6px}
  .score .num{font-size:46px;font-weight:800;color:var(--navy);line-height:1}
  .score .of{font-size:16px;color:var(--muted);font-weight:600}
  .ipp{display:grid;grid-template-columns:1fr 1fr;gap:10px 24px}
  .ipp .k{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .ipp .v{font-size:14px;margin:2px 0 10px}
  ul.tags{list-style:none;padding:0;margin:2px 0 10px;display:flex;flex-wrap:wrap;gap:7px}
  ul.tags li{background:#eef2f9;border-radius:7px;padding:5px 10px;font-size:13px}
  .pair{border:1px solid var(--line);border-left:5px solid var(--gold);border-radius:8px;padding:11px 14px;margin-bottom:9px;background:#fffdf7}
  .pair .a{font-weight:700;color:var(--navy);font-size:14px}
  .pair .b{font-size:14px;margin-top:3px}
  .pair .c{font-size:13px;color:var(--muted);margin-top:4px;font-style:italic}
  .preempt .pair{border-left-color:var(--navy2);background:#f6f9ff}
  .opening{background:var(--navy);color:#fff;border-radius:10px;padding:16px 18px;font-size:16px;line-height:1.5}
  .gaps{font-size:13px;color:var(--warn)}
  .conf{font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px}
  .conf.high{background:#e4f4ea;color:var(--good)} .conf.medium{background:#fdf3df;color:var(--warn)} .conf.low{background:#fbe9e9;color:var(--bad)}
  .err{background:#fbe9e9;border:1px solid #f0c4c4;color:var(--bad);padding:12px 14px;border-radius:9px;font-size:14px;margin-top:12px}
  .adv{margin-top:10px;font-size:12px;color:var(--muted)}
  details summary{cursor:pointer;color:var(--navy2);font-size:13px;font-weight:600}
</style>
</head>
<body>
<header>
  <h1>DRiX Investor</h1>
  <div class="tag">Profile the investor. Position the raise. <b>The engine reads the room.</b></div>
</header>

<div class="wrap">
  <div class="panel">
    <div class="grid">
      <div>
        <label>Investor — public page (bio, fund page, interview, talk)</label>
        <input id="investor_url" type="text" placeholder="https://…  (LinkedIn won't scrape — use a content-rich page)" />
      </div>
      <div>
        <label>Investor name (optional)</label>
        <input id="investor_name" type="text" placeholder="Dr. Warren Linger" />
      </div>
    </div>
    <div class="row">
      <div>
        <label>Investor type</label>
        <div class="seg" id="seg">
          <button data-v="individual" class="on">Individual / Angel</button>
          <button data-v="company">Fund / Firm</button>
        </div>
      </div>
      <div style="flex:1;min-width:260px">
        <label>Your solution — site or deck URL</label>
        <input id="solution_url" type="text" placeholder="https://wintechpartners.com" />
      </div>
    </div>
    <button class="run" id="run">Run DRiX Investor →</button>
    <div class="hint">Decomposes both into 9D-tagged atoms, builds an Investment Personality Profile, and positions your solution to win this investor.</div>
    <details class="adv"><summary>Advanced</summary>
      <div class="row" style="margin-top:10px">
        <div style="flex:1;min-width:260px">
          <label>API base (leave blank = same server)</label>
          <input id="api_base" type="text" placeholder="" />
        </div>
        <label style="font-weight:600;color:var(--ink);text-transform:none;letter-spacing:0">
          <input type="checkbox" id="refresh" /> Force fresh ingest (ignore cache)
        </label>
      </div>
    </details>
  </div>

  <div class="panel stage" id="liveStage">
    <h2 style="margin-top:0;font-size:14px;color:var(--navy);letter-spacing:.5px">LIVE</h2>
    <div class="phases" id="phases"></div>
    <div class="counts" id="counts"></div>
    <div id="errBox"></div>
  </div>

  <div class="panel stage brief" id="briefStage"></div>
</div>

<script>
const $ = id => document.getElementById(id);
let investorType = 'individual';
$('seg').addEventListener('click', e => {
  const b = e.target.closest('button'); if(!b) return;
  investorType = b.dataset.v;
  [...$('seg').children].forEach(x => x.classList.toggle('on', x===b));
});

function phaseEl(msg){
  const d = document.createElement('div'); d.className='phase';
  d.innerHTML = '<span class="dot"></span><span>'+esc(msg)+'</span>';
  $('phases').appendChild(d); return d;
}
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

$('run').addEventListener('click', run);

async function run(){
  const investor_url = $('investor_url').value.trim();
  const solution_url = $('solution_url').value.trim();
  if(!investor_url || !solution_url){ alert('Need an investor URL and a solution URL.'); return; }
  const apiBase = $('api_base').value.trim().replace(/\/+$/,'');

  $('run').disabled = true;
  $('liveStage').classList.add('show');
  $('briefStage').classList.remove('show'); $('briefStage').innerHTML='';
  $('phases').innerHTML=''; $('counts').innerHTML=''; $('errBox').innerHTML='';
  let cur = phaseEl('Starting…');

  const body = {
    investor_url, solution_url,
    investor_name: $('investor_name').value.trim() || undefined,
    investor_type: investorType,
    refresh_investor: $('refresh').checked || undefined,
    refresh_solution: $('refresh').checked || undefined,
  };

  try{
    const res = await fetch(apiBase + '/api/investor-flow', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if(!res.ok){ const t = await res.text(); throw new Error('HTTP '+res.status+' — '+t.slice(0,300)); }

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf='';
    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      buf += dec.decode(value, {stream:true});
      let i;
      while((i = buf.indexOf('\n\n')) >= 0){
        const block = buf.slice(0,i); buf = buf.slice(i+2);
        let ev=null, data='';
        block.split('\n').forEach(line=>{
          if(line.startsWith('event:')) ev = line.slice(6).trim();
          else if(line.startsWith('data:')) data += line.slice(5).trim();
        });
        if(ev) handle(ev, data ? safeJSON(data) : {}, ()=>{cur.classList.add('done');});
      }
    }
  }catch(err){
    $('errBox').innerHTML = '<div class="err">'+esc(err.message)+'</div>';
  }finally{
    $('run').disabled = false;
  }

  function handle(ev, d, markDone){
    if(ev==='phase'){ markDone(); cur = phaseEl(d.message || d.phase); }
    else if(ev==='atoms'){
      const inv = (d.investor && d.investor.atoms) ? d.investor.atoms.length : 0;
      const sol = (d.solution && d.solution.atoms) ? d.solution.atoms.length : 0;
      const iname = d.investor && d.investor.target && d.investor.target.name ? d.investor.target.name : 'Investor';
      const sname = d.solution && d.solution.target && d.solution.target.name ? d.solution.target.name : 'Solution';
      $('counts').innerHTML =
        '<span class="chip">'+esc(iname)+': <b>'+inv+'</b> atoms</span>'+
        '<span class="chip">'+esc(sname)+': <b>'+sol+'</b> atoms</span>';
    }
    else if(ev==='positioning'){ markDone(); renderBrief(d.brief); }
    else if(ev==='done'){ markDone(); const s=phaseEl('Done'+(d.elapsed_ms?(' — '+(d.elapsed_ms/1000).toFixed(1)+'s'):'')); s.classList.add('done'); }
    else if(ev==='error'){ $('errBox').innerHTML = '<div class="err">'+esc(d.error||'Unknown error')+'</div>'; }
  }
}

function safeJSON(s){ try{return JSON.parse(s);}catch(e){return {};} }

function renderBrief(b){
  if(!b){ return; }
  const ipp = b.investment_personality_profile || {};
  const conf = (ipp.confidence||'').toLowerCase();
  const arr = x => Array.isArray(x)? x : (x? [x]: []);
  let h = '';
  h += '<div class="score"><div class="num">'+(b.fit_score!=null?b.fit_score:'—')+'</div><div class="of">/ 100 fit'+
       (conf?'  &nbsp;<span class="conf '+esc(conf)+'">'+esc(ipp.confidence)+' confidence</span>':'')+'</div></div>';
  if(b.fit_rationale) h += '<div class="v" style="margin-bottom:6px">'+esc(b.fit_rationale)+'</div>';

  h += '<h2>Investment Personality Profile'+(b.investor_name?' — '+esc(b.investor_name):'')+'</h2>';
  h += '<div class="ipp">';
  if(ipp.thesis){ h+='<div style="grid-column:1/3"><div class="k">Thesis</div><div class="v">'+esc(ipp.thesis)+'</div></div>'; }
  if(ipp.evidence_preference){ h+='<div><div class="k">Evidence they trust</div><div class="v">'+esc(ipp.evidence_preference)+'</div></div>'; }
  if(ipp.decision_style){ h+='<div><div class="k">Decision style</div><div class="v">'+esc(ipp.decision_style)+'</div></div>'; }
  h += '</div>';
  if(arr(ipp.conviction_drivers).length){ h+='<div class="k">Conviction drivers</div><ul class="tags">'+arr(ipp.conviction_drivers).map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul>'; }
  if(arr(ipp.deal_breakers).length){ h+='<div class="k">Deal-breakers / risk posture</div><ul class="tags">'+arr(ipp.deal_breakers).map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul>'; }

  if(arr(b.lead_with).length){
    h += '<h2>Lead with</h2>';
    arr(b.lead_with).forEach(p=>{
      h += '<div class="pair"><div class="a">'+esc(p.conviction_driver||'')+'  →  '+esc(p.solution_strength||'')+'</div>'+
           (p.why?'<div class="c">'+esc(p.why)+'</div>':'')+'</div>';
    });
  }
  if(arr(b.preempt).length){
    h += '<h2>Preempt</h2><div class="preempt">';
    arr(b.preempt).forEach(p=>{
      h += '<div class="pair"><div class="a">'+esc(p.deal_breaker||'')+'</div><div class="b">'+esc(p.mitigation||'')+'</div></div>';
    });
    h += '</div>';
  }
  if(b.opening_line){ h += '<h2>The opening line</h2><div class="opening">“'+esc(b.opening_line)+'”</div>'; }
  if(arr(b.gaps).length){ h += '<h2>Honest gaps</h2><ul class="tags gaps">'+arr(b.gaps).map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul>'; }

  $('briefStage').innerHTML = h;
  $('briefStage').classList.add('show');
}
</script>
</body>
</html>
